<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SkyByte Store</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}
header{
padding:30px;
background:#1e293b;
font-size:28px;
font-weight:bold;
}
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}
.price{
color:#38bdf8;
font-size:20px;
margin:10px 0;
}
.btn{
padding:10px 15px;
background:#22c55e;
border:none;
color:black;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🎮 SkyByte Store</header>

<div class="container">

<div class="card">
<h2>PUBG UC</h2>
<p class="price">100 UC - $1</p>
<button class="btn">شراء</button>
</div>

<div class="card">
<h2>Free Fire 💎</h2>
<p class="price">100 Diamond - $1</p>
<button class="btn">شراء</button>
</div>

<div class="card">
<h2>TikTok Coins</h2>
<p class="price">100 Coins - $1</p>
<button class="btn">شراء</button>
</div>

</div>

</body>
</html>
